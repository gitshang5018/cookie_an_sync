<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Sync (Sender Auxiliary)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

        :root {
            --accent: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.4);
            --warning: #f59e0b;
            --danger: #ef4444;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 260px;
            height: fit-content;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background-color: #020617; /* 纯净深色背景 */
            color: #f1f5f9;
        }

        .glass-container {
            margin: 0;
            padding: 20px;
            height: auto;
            background: #0f172a; /* 实色卡片 */
            border-bottom: 1px solid #1e293b;
            box-shadow: none;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        }

        .title h1 {
            font-size: 1.05rem;
            font-weight: 800;
            background: linear-gradient(135deg, #a5b4fc, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        .title .subtitle {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 2px;
            margin-top: 2px;
            opacity: 0.8;
        }

        .status-box {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 0;
            padding: 16px;
            text-align: center;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
        }

        .dot {
            width: 10px; height: 10px;
            border-radius: 0;
            background: var(--danger);
            box-shadow: 0 0 5px var(--danger);
            transition: all 0.4s ease;
        }
        .dot.active {
            background: var(--accent);
            box-shadow: 0 0 12px var(--accent-glow);
            animation: glow 2s ease-in-out infinite alternate;
        }
        .dot.scanning {
            background: var(--warning);
            box-shadow: 0 0 10px var(--warning);
            animation: pulse 1s infinite;
        }

        @keyframes pulse { 0% { opacity: 0.4; } 100% { opacity: 1; } }
        @keyframes glow {
            0% { box-shadow: 0 0 8px var(--accent-glow); }
            100% { box-shadow: 0 0 18px var(--accent-glow), 0 0 30px rgba(16, 185, 129, 0.15); }
        }

        .status-text {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        .info-area {
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 0.72rem;
            color: var(--text-secondary);
        }
        .ip-label {
            display: block;
            margin-bottom: 5px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .ip-val {
            color: var(--text-primary);
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.8rem;
            background: rgba(99, 102, 241, 0.12);
            padding: 4px 8px;
            border-radius: 0;
            display: inline-block;
        }

        .hint {
            margin-top: 18px;
            font-size: 0.68rem;
            opacity: 0.5;
            font-style: italic;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="glass-container">
        <div class="header">
            <div class="title">
                <h1>Cookie 辅助采集器</h1>
                <div class="subtitle">SENDER NODE</div>
            </div>
        </div>

        <div class="status-box">
            <div class="status-badge">
                <span id="dot" class="dot"></span>
                <span id="status-text" class="status-text">初始化...</span>
            </div>

            <div id="info-area" class="info-area" style="display: none;">
                <span class="ip-label">当前连接地址:</span>
                <span id="server-url" class="ip-val">---</span>
            </div>

            <p class="hint">全自动静默运行模式，无需干预。</p>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
