<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Sync (Receiver Node)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

        :root {
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --success: #22c55e;
            --success-glow: rgba(34, 197, 94, 0.4);
            --warning: #f59e0b;
            --danger: #ef4444;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 260px;
            height: fit-content;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background-color: #020617;
            color: #f1f5f9;
        }

        .glass-container {
            margin: 0;
            padding: 20px;
            height: auto;
            background: #0f172a;
            border-bottom: 1px solid #1e293b;
            box-shadow: none;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        }

        .title h1 {
            font-size: 1.05rem;
            font-weight: 800;
            background: linear-gradient(135deg, #818cf8, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        .title .subtitle {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 2px;
            margin-top: 2px;
            opacity: 0.8;
        }

        .status-box {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 0;
            padding: 16px;
            text-align: center;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
        }

        .dot {
            width: 10px; height: 10px;
            border-radius: 0;
            background: var(--danger);
            box-shadow: 0 0 5px var(--danger);
            transition: all 0.4s ease;
        }
        .dot.active {
            background: var(--success);
            box-shadow: 0 0 12px var(--success-glow);
            animation: glow 2s ease-in-out infinite alternate;
        }
        .dot.scanning {
            background: var(--warning);
            box-shadow: 0 0 10px var(--warning);
            animation: pulse 1s infinite;
        }

        @keyframes pulse { 0% { opacity: 0.4; } 100% { opacity: 1; } }
        @keyframes glow {
            0% { box-shadow: 0 0 8px var(--success-glow); }
            100% { box-shadow: 0 0 18px var(--success-glow), 0 0 30px rgba(34, 197, 94, 0.15); }
        }

        .status-text {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        .stats-grid {
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 0.72rem;
            color: var(--text-secondary);
            text-align: left;
        }
        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .stat-val {
            color: var(--text-primary);
            font-weight: 600;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.75rem;
            background: rgba(99, 102, 241, 0.1);
            padding: 2px 8px;
            border-radius: 0;
        }

        .hint {
            margin-top: 18px;
            font-size: 0.68rem;
            opacity: 0.5;
            font-style: italic;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="glass-container">
        <div class="header">
            <div class="title">
                <h1>Cookie 自动接收器</h1>
                <div class="subtitle">RECEIVER NODE</div>
            </div>
        </div>

        <div class="status-box">
            <div class="status-badge">
                <span id="dot" class="dot"></span>
                <span id="status-text" class="status-text">初始化...</span>
            </div>

            <div id="stats-area" class="stats-grid" style="display: none;">
                <div class="stat-item">
                    <span>同步来源:</span>
                    <span id="server-url" class="stat-val">---</span>
                </div>
                <div class="stat-item">
                    <span>上次同步:</span>
                    <span id="last-sync" class="stat-val">从未</span>
                </div>
            </div>

            <p class="hint">接收端正在后台监听局域网同步指令。</p>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
